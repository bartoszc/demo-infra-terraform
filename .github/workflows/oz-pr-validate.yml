name: Oz PR Validator

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Oz PR Validator
        uses: warpdotdev/oz-agent-action@v1
        with:
          skill: 'bartoszc/oz-skills:pr-validator'
          prompt: |
            Validate PR #${{ github.event.pull_request.number }} in this repository.
            Check audit report structure, verify URLs, confirm dependency findings,
            and post a validation summary as a PR comment.
          warp_api_key: ${{ secrets.WARP_API_KEY }}
